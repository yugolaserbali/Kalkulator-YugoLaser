<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e272e" />
      <stop offset="100%" stop-color="#2c3e50" />
    </linearGradient>
    
    <!-- Laser Glow Gradient -->
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f39c12" />
      <stop offset="100%" stop-color="#e67e22" />
    </linearGradient>

    <!-- Beam Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Squircle (Maskable safe area is within 10% padding, which is 51.2px) -->
  <rect x="0" y="0" width="512" height="512" rx="102" fill="url(#bgGrad)" />

  <!-- Outer Laser Beam Circle (Decorative) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#2c3e50" stroke-width="4" stroke-dasharray="10 15" opacity="0.3" />

  <!-- Laser Cut Lines / Geometric grid (Behind) -->
  <path d="M 120 256 L 392 256 M 256 120 L 256 392" stroke="#ffffff" stroke-width="2" opacity="0.1" stroke-dasharray="5 5" />

  <!-- Stylized Y and Laser Cut Symbol -->
  <!-- Left arm of Y -->
  <path d="M 160 140 L 256 256" stroke="url(#laserGrad)" stroke-width="32" stroke-linecap="round" />
  <!-- Right arm of Y -->
  <path d="M 352 140 L 256 256" stroke="url(#laserGrad)" stroke-width="32" stroke-linecap="round" />
  <!-- Stem of Y (with a cut effect) -->
  <path d="M 256 272 L 256 380" stroke="url(#laserGrad)" stroke-width="32" stroke-linecap="round" />

  <!-- Laser Impact / Cutting Point -->
  <circle cx="256" cy="256" r="24" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="256" r="12" fill="#f1c40f" />

  <!-- Decorative Spark / Beam -->
  <path d="M 256 210 L 256 302 M 210 256 L 302 256" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8" />
</svg>
